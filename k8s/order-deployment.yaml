apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: ecommerce-order:latest
        imagePullPolicy: Never
        env:
        - name: DATABASE_URL
          value: postgresql://postgres:postgres@order-db:5432/order_db
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: kafka:29092
        - name: PRODUCT_SERVICE_URL
          value: http://product-service:8000
        ports:
        - containerPort: 8000
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  selector:
    app: order-service
  ports:
  - port: 8000
    targetPort: 8000
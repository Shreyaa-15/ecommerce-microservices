apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    events { worker_connections 1024; }
    http {
      upstream auth_service    { server auth-service:8000; }
      upstream product_service { server product-service:8000; }
      upstream order_service   { server order-service:8000; }
      upstream payment_service { server payment-service:8000; }
      server {
        listen 80;
        location /auth/     { proxy_pass http://auth_service/; }
        location /products/ { proxy_pass http://product_service/; }
        location /orders/   { proxy_pass http://order_service/; }
        location /payments/ { proxy_pass http://payment_service/; }
        location /health    { return 200 '{"status":"ok"}'; add_header Content-Type application/json; }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30000
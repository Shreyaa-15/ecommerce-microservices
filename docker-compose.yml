version: '3.8'

services:
  # --- Databases (one per service) ---
  auth-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  product-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: productdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - product-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  order-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  payment-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: paymentdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Kafka + Zookeeper ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # --- Microservices ---
  auth-service:
    build: ./services/auth
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@auth-db:5432/authdb
      SECRET_KEY: super-secret-jwt-key-change-in-production
    depends_on:
      auth-db:
        condition: service_healthy
    restart: unless-stopped

  product-service:
    build: ./services/product
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@product-db:5432/productdb
    depends_on:
      product-db:
        condition: service_healthy
    restart: unless-stopped

  order-service:
    build: ./services/order
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@order-db:5432/orderdb
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PRODUCT_SERVICE_URL: http://product-service:8000
      AUTH_SERVICE_URL: http://auth-service:8000
    depends_on:
      order-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  payment-service:
    build: ./services/payment
    ports:
      - "8004:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@payment-db:5432/paymentdb
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      payment-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # --- API Gateway ---
  gateway:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - product-service
      - order-service
      - payment-service
    restart: unless-stopped

volumes:
  auth-db-data:
  product-db-data:
  order-db-data:
  payment-db-data: